version: "2"
sql:
  - engine: "postgresql"
    # スキーマは golang-migrate のマイグレーション群から読む（*.down.sql は無視される）。
    # 素の SQL を唯一の出どころにし、生成コードはそこから型安全に導く。
    schema: "db/migrations"
    queries: "internal/db/queries"
    gen:
      go:
        package: "sqlcdb"
        out: "internal/db/sqlcdb"
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
