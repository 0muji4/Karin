# ローカルでの起動用。`docker compose up` で DB→マイグレーション→API サーバが立ち上がる。
# 日次マッチャは手動: `docker compose run --rm matcher`。
services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: karin
      POSTGRES_PASSWORD: karin
      POSTGRES_DB: karin
    ports: ["55432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karin -d karin"]
      interval: 2s
      timeout: 3s
      retries: 30

  migrate:
    build: .
    command: ["/usr/local/bin/migrate", "up"]
    environment:
      DATABASE_URL: postgres://karin:karin@db:5432/karin?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  server:
    build: .
    command: ["/usr/local/bin/server"]
    environment:
      DATABASE_URL: postgres://karin:karin@db:5432/karin?sslmode=disable
      KARIN_HTTP_ADDR: ":8080"
      KARIN_KO_TTL: "6"
    ports: ["18080:8080"]
    depends_on:
      migrate:
        condition: service_completed_successfully

  # 日次マッチング（バッチ）。既定の up では起動せず、手動・cron で実行する。
  matcher:
    build: .
    command: ["/usr/local/bin/matcher"]
    environment:
      DATABASE_URL: postgres://karin:karin@db:5432/karin?sslmode=disable
      KARIN_KO_TTL: "6"
    depends_on:
      db:
        condition: service_healthy
    profiles: ["tools"]
