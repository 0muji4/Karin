# Render Blueprint（記録 MVP / Phase 1）。
#
# 前提: マネージド PostgreSQL は外部 Neon（DATABASE_URL を Secret で渡す）。
#   理由は DD 相当の判断: 計算ホストとの結合が弱く脱ロックイン・可搬性に効き、
#   ブランチでマイグレーション検証が安全なため（夏鈴の低・間欠トラフィックでコールドスタートは許容）。
#   Render Postgres を使う場合は databases: ブロックを足し、DATABASE_URL を fromDatabase 参照に変える。
#
# 関門(モデレーション): 出口の安全判定は実装済み。下の KARIN_LLM_* を設定すると Vertex AI で動き、
#   未設定なら AllPass（全通過）で起動する。交換を実ユーザーへ開くときは、関門を有効化し、
#   matcher cron を作成・有効化する（Phase 1=記録のみなら関門未設定・cron 停止のままでよい）。
#
# 注意: Render の Blueprint 仕様は変わりうる。デプロイ時に最新仕様で要検証。
#
# Vertex AI の有効化手順（server・matcher 共通）:
#   1) GCP のサービスアカウント JSON を Render の Secret File としてアップロードする
#      （例: /etc/secrets/gcp-sa.json）。Vertex は ADC で認証し、データは学習に使われない。
#   2) 下の KARIN_LLM_* と GOOGLE_APPLICATION_CREDENTIALS を設定する。
#   3) KARIN_LLM_PROVIDER を "vertex" にすると、起動時に project/location/model が必須になる。

services:
  - type: web
    name: karin-server
    runtime: docker
    rootDir: apps/backend
    dockerfilePath: ./Dockerfile
    dockerCommand: /usr/local/bin/server
    region: singapore # 日本に最も近いリージョン
    plan: free
    healthCheckPath: /healthz
    # 新版を公開する前にマイグレーションを適用する。preDeployCommand は有料プランの機能なので、
    # 無料プランでは無効化し、マイグレーションは手動で流す（README/手順参照）:
    #   cd apps/backend && DATABASE_URL='<Neon の接続文字列>' go run ./cmd/migrate up
    # 有料プランに上げたら下のコメントを外すと、デプロイ前に自動適用される。
    # preDeployCommand: /usr/local/bin/migrate up
    envVars:
      - key: DATABASE_URL # Neon の接続文字列（sslmode=require 推奨）。Secret として手動設定。
        sync: false
      - key: KARIN_HTTP_ADDR # Render は PORT=10000 での待受を期待する。
        value: ":10000"
      - key: KARIN_KO_TTL
        value: "6"
      # 関門。未設定なら AllPass で起動する（Phase 1=記録のみ向け）。有効化は上の手順を参照。
      - key: KARIN_LLM_PROVIDER # 有効化するなら "vertex"
        sync: false
      - key: KARIN_LLM_MODEL # 例: gemini-2.5-flash（利用可能なモデル ID に合わせる）
        sync: false
      - key: KARIN_LLM_PROJECT # GCP プロジェクト ID
        sync: false
      - key: KARIN_LLM_LOCATION # 例: asia-northeast1（東京）
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS # 例: /etc/secrets/gcp-sa.json（Secret File のパス）
        sync: false

  # 日次マッチャ。交換を開くまでは作成しない／スケジュールを止める（記録のみの運用）。
  # 保留の再判定で関門を使うため、有効化時は下の KARIN_LLM_* も設定する。Render の Cron Job は有料プラン。
  # Render Cron は有料プランのため、無料デプロイ（記録中心の Phase 1）では無効化している。
  # 交換を実ユーザーへ開くときに、下のコメントを外して Blueprint を再適用し、
  # DATABASE_URL（と関門を使うなら KARIN_LLM_*）を設定する。
  # - type: cron
  #   name: karin-matcher
  #   runtime: docker
  #   rootDir: apps/backend
  #   dockerfilePath: ./Dockerfile
  #   dockerCommand: /usr/local/bin/matcher
  #   region: singapore
  #   plan: starter
  #   schedule: "0 18 * * *" # 毎日 18:00 UTC = 03:00 JST
  #   envVars:
  #     - key: DATABASE_URL
  #       sync: false
  #     - key: KARIN_KO_TTL
  #       value: "6"
  #     - key: KARIN_LLM_PROVIDER
  #       sync: false
  #     - key: KARIN_LLM_MODEL
  #       sync: false
  #     - key: KARIN_LLM_PROJECT
  #       sync: false
  #     - key: KARIN_LLM_LOCATION
  #       sync: false
  #     - key: GOOGLE_APPLICATION_CREDENTIALS
  #       sync: false
