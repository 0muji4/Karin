name: backend-ci

# Go バックエンドの検証。結合テストは testcontainers で本物の PostgreSQL 18 を立てる。
# ubuntu-latest には Docker が同梱されており、testcontainers がそのまま動く。
on:
  pull_request:
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend_ci.yaml'
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend_ci.yaml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # go.mod の go ディレクティブに追従する（バージョンを一箇所で管理）。
          go-version-file: apps/backend/go.mod
          cache-dependency-path: apps/backend/go.sum
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      # 結合テストの前に PostgreSQL イメージを事前取得する。testcontainers は
      # ローカルにあれば pull しないため、Docker Hub の一時的なタイムアウトで
      # テストが落ちるのを防ぐ（リトライ付き）。
      - name: Pre-pull PostgreSQL image (retry against transient registry timeouts)
        working-directory: ${{ github.workspace }}
        run: |
          for i in 1 2 3 4 5; do
            docker pull postgres:18 && break
            echo "::warning::postgres:18 の取得に失敗（試行 ${i}/5）。再試行します"
            sleep 10
          done
          docker image inspect postgres:18 >/dev/null
      - name: go test (PostgreSQL 18 via testcontainers)
        run: go test ./...
