name: backend-ci

# Go バックエンドの検証。結合テストは testcontainers で本物の PostgreSQL 18 を立てる。
# ubuntu-latest には Docker が同梱されており、testcontainers がそのまま動く。
on:
  pull_request:
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend_ci.yaml'
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend_ci.yaml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # go.mod の go ディレクティブに追従する（バージョンを一箇所で管理）。
          go-version-file: apps/backend/go.mod
          cache-dependency-path: apps/backend/go.sum
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test (PostgreSQL 18 via testcontainers)
        run: go test ./...
